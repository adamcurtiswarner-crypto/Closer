<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stoke</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F2EE;
      color: #2b2622;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #D4522A;
      margin-bottom: 20px;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #D4522A;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      padding: 16px 24px;
    }
  </style>
</head>
<body>
  <main>
    <div class="wordmark">Stoke</div>
    <h1>One question a day, answered together.</h1>
    <a href="https://apps.apple.com/app/id6759679330">Get Stoke on the App Store</a>
  </main>
</body>
</html>
