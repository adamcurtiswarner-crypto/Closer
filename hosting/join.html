<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>You&rsquo;re invited to Stoke</title>
  <meta property="og:title" content="You're invited to Stoke">
  <meta property="og:description" content="One question a day, answered together.">
  <style>
    :root {
      --bg: #F5F2EE;
      --ink: #2b2622;
      --ink-soft: #6f675f;
      --coral: #D4522A;
      --coral-dark: #b3654a;
      --card: #ffffff;
      --border: #e5ded6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 400px; width: 100%; text-align: center; }
    .wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--coral);
      margin-bottom: 28px;
    }
    h1 {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink-soft);
      margin-bottom: 32px;
    }
    .code-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px 20px;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(43, 38, 34, 0.06);
    }
    .code-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 10px;
    }
    .code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--ink);
      margin-bottom: 16px;
      word-break: break-all;
    }
    .copy-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      border-radius: 12px;
      padding: 12px 24px;
      min-height: 44px;
      cursor: pointer;
    }
    .copy-btn.copied { border-color: var(--coral); color: var(--coral); }
    .hint {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 28px;
    }
    .store-btn {
      display: block;
      background: var(--coral);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      padding: 16px 24px;
      margin-bottom: 16px;
    }
    .store-btn:active { background: var(--coral-dark); }
    .open-app {
      display: inline-block;
      font-size: 15px;
      color: var(--coral);
      text-decoration: none;
      padding: 10px;
      min-height: 44px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="wordmark">Stoke</div>
    <h1 id="headline">You&rsquo;re invited to Stoke</h1>
    <p class="sub">One question a day, answered together.</p>

    <div class="code-card" id="code-card" hidden>
      <div class="code-label">Your invite code</div>
      <div class="code" id="code"></div>
      <button class="copy-btn" id="copy-btn" type="button">Copy code</button>
    </div>
    <p class="hint" id="hint" hidden>Enter this code in the app after you sign up.</p>

    <a class="store-btn" href="https://apps.apple.com/app/id6759679330">Get Stoke on the App Store</a>
    <a class="open-app" id="open-app" hidden>Already have the app? Open Stoke</a>
  </main>

  <script>
    (function () {
      var match = window.location.pathname.match(/\/join\/([A-Za-z0-9]{6})\/?$/);
      var code = match ? match[1].toUpperCase() : null;

      var params = new URLSearchParams(window.location.search);
      var from = (params.get('from') || '').trim().slice(0, 40);
      if (from) {
        // textContent — never injected as HTML
        document.getElementById('headline').textContent = from + ' invited you to Stoke';
      }

      if (!code) return;

      document.getElementById('code').textContent = code;
      document.getElementById('code-card').hidden = false;
      document.getElementById('hint').hidden = false;

      var openApp = document.getElementById('open-app');
      openApp.href = 'stoke://join/' + code;
      openApp.hidden = false;

      var btn = document.getElementById('copy-btn');
      btn.addEventListener('click', function () {
        function done() {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy code';
            btn.classList.remove('copied');
          }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(done).catch(fallback);
        } else {
          fallback();
        }
        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = code;
          ta.setAttribute('readonly', '');
          ta.style.position = 'absolute';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); done(); } catch (e) { /* leave label unchanged */ }
          document.body.removeChild(ta);
        }
      });
    })();
  </script>
</body>
</html>
